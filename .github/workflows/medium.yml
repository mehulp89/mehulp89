name: Update Medium Posts

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

jobs:
  update-readme-with-medium:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@mehulp89"
